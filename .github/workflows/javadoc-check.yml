name: Javadoc Check
on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  javadoc:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout ChemClipse
      uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      name: Setup Java
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: sdkman/sdkman-action@main
      name: Setup Maven
      id: maven
      with:
        candidate: maven
        version: 3.9.12

    - name: Verify Javadoc with Maven
      env:
        MAVEN_ARGS: "--batch-mode --no-transfer-progress -Dstyle.color=always"
      run: |
        source $HOME/.sdkman/bin/sdkman-init.sh
        mvn -f chemclipse/pom.xml clean install -Pjavadoc -DskipTests
